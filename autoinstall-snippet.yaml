# autoinstall-snippet.yaml — drop-in for the client's Ubuntu 24.04 autoinstall.
#
# Brings up the turnkey Dify stack (Dify's ~11-container upstream + our setup panel +
# Caddy/TLS) for ONE client on first boot. Prepares the checkout + compose-level secret
# + a first-boot oneshot; the actual work (write Dify overlay, run provision.sh to start
# Dify, bring up the panel side-stack) happens in firstboot.sh on the first real boot.
#
# The provisioner substitutes {panel_password}. PANEL_DOMAIN is left blank so
# firstboot.sh auto-derives vps-<o3>-<o4>.cloudhosting.lv. The Dify SECRET_KEY is
# generated by firstboot.sh; the model provider (avots) is configured in Dify's console
# (best-effort/manual — Dify stores credentials encrypted in Postgres). It's a builder.

autoinstall:
  version: 1

  packages:
    - git
    - docker.io
    - docker-compose-v2
    - ca-certificates
    - openssl
    - python3
    - curl

  late-commands:
    - ["curtin", "in-target", "--", "bash", "-c", "apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y git docker.io docker-compose-v2 ca-certificates openssl python3 curl"]
    - ["curtin", "in-target", "--", "bash", "-c", "test -d /opt/dify-vm || git clone --depth 1 https://github.com/cloudhostinglv/dify-vm.git /opt/dify-vm"]
    - ["curtin", "in-target", "--", "bash", "-c", "umask 077 && printf 'PANEL_PASSWORD=%s\\nPANEL_DOMAIN=\\n' '{panel_password}' > /opt/dify-vm/.env"]
    - ["curtin", "in-target", "--", "chmod", "0600", "/opt/dify-vm/.env"]
    - ["curtin", "in-target", "--", "chmod", "0755", "/opt/dify-vm/firstboot.sh"]
    - ["curtin", "in-target", "--", "cp", "/opt/dify-vm/dify-firstboot.service", "/etc/systemd/system/dify-firstboot.service"]
    - ["curtin", "in-target", "--", "systemctl", "enable", "dify-firstboot.service"]
