# autoinstall-snippet.yaml — drop-in for the client's Ubuntu 24.04 autoinstall.
#
# Brings up vanilla Dify (its ~11-container upstream stack, no CloudHosting panel/Caddy)
# for ONE client on first boot. Clones the checkout + installs a first-boot oneshot; the
# real work (write the Dify overlay, run provision.sh to clone + start Dify) happens in
# firstboot.sh.
#
# No panel password needed: Dify serves its own console on http://<host> (:80) and you
# create the admin at /install on first visit. PANEL_DOMAIN is left blank so firstboot
# auto-derives vps-<o3>-<o4>.cloudhosting.lv (used for Dify's public URLs). SECRET_KEY is
# generated by firstboot. The model provider (avots = OpenAI-API-compatible) is set in
# Dify's console (provision.sh prints the exact steps). It's a builder.

autoinstall:
  version: 1

  packages:
    - git
    - docker.io
    - docker-compose-v2
    - ca-certificates
    - openssl
    - python3
    - curl

  late-commands:
    - ["curtin", "in-target", "--", "bash", "-c", "apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y git docker.io docker-compose-v2 ca-certificates openssl python3 curl"]
    - ["curtin", "in-target", "--", "bash", "-c", "test -d /opt/dify-vm || git clone --depth 1 https://github.com/cloudhostinglv/dify-vm.git /opt/dify-vm"]
    - ["curtin", "in-target", "--", "bash", "-c", "umask 077 && printf 'PANEL_DOMAIN=\\n' > /opt/dify-vm/.env"]
    - ["curtin", "in-target", "--", "chmod", "0600", "/opt/dify-vm/.env"]
    - ["curtin", "in-target", "--", "chmod", "0755", "/opt/dify-vm/firstboot.sh"]
    - ["curtin", "in-target", "--", "cp", "/opt/dify-vm/dify-firstboot.service", "/etc/systemd/system/dify-firstboot.service"]
    - ["curtin", "in-target", "--", "systemctl", "enable", "dify-firstboot.service"]
